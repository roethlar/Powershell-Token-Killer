receivers:
  otlp:
    protocols:
      http:
        endpoint: 127.0.0.1:4318
exporters:
  splunk_hec/ptk:
    endpoint: https://splunk.example.invalid:8088/services/collector/event
    token: ${env:SPLUNK_HEC_TOKEN}
    source: ptk
    sourcetype: ptk:audit
    index: ptk
    otel_attrs_to_hec_metadata:
      host: host.id
service:
  pipelines:
    logs/ptk:
      receivers: [otlp]
      exporters: [splunk_hec/ptk]
