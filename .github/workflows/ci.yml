name: CI

on:
  push:
    branches: [master, 'ci/**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      # Pester 5 is preinstalled on all three runner images (slice-0 probe);
      # the install is a fallback for runner-image drift.
      - name: Ensure Pester 5
        shell: pwsh
        run: |
          if (-not (Get-Module Pester -ListAvailable | Where-Object { $_.Version -ge [version]'5.0.0' })) {
            Install-Module Pester -MinimumVersion 5.0.0 -Force -Scope CurrentUser -SkipPublisherCheck
          }

      - name: Pester suite
        shell: pwsh
        run: Invoke-Pester -Path tests/PwshTokenCompressor.Tests.ps1 -Output Detailed -CI

      - name: Server tests
        run: dotnet test server/PtkMcpServer.slnx

      - name: Stdio handshake
        shell: pwsh
        run: ./server/test-handshake.ps1

  siem:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: SIEM receiver tests
        run: dotnet test siem/PtkSiem.slnx

      - name: Producer to SIEM conformance
        env:
          PTK_SIEM_CONFORMANCE_MODE: in-process
        run: >-
          dotnet test
          server/PtkMcpServer.Tests/SiemConformance/PtkMcpServer.SiemConformance.Tests.csproj
