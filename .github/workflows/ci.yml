name: CI

on:
  push:
    branches: [master, 'ci/**']
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      # Pin the frozen dependency cutoff instead of accepting runner-image drift.
      - name: Ensure Pester 6.0.1
        shell: pwsh
        run: |
          $requiredVersion = '6.0.1'
          if (-not (Get-Module Pester -ListAvailable | Where-Object { $_.Version -eq [version]$requiredVersion })) {
            if (Get-Command Install-PSResource -ErrorAction SilentlyContinue) {
              Install-PSResource -Name Pester -Version $requiredVersion -Repository PSGallery -Scope CurrentUser -TrustRepository
            }
            else {
              Install-Module Pester -RequiredVersion $requiredVersion -Repository PSGallery -Scope CurrentUser -Force -SkipPublisherCheck
            }
          }

      - name: Pester suite
        shell: pwsh
        run: |
          Import-Module Pester -RequiredVersion 6.0.1 -Force
          Invoke-Pester -Path tests/PwshTokenCompressor.Tests.ps1 -Output Detailed -CI

      - name: Server tests
        run: dotnet test server/PtkMcpServer.slnx

      - name: Stdio handshake
        shell: pwsh
        run: ./server/test-handshake.ps1

  siem:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: SIEM receiver tests
        run: dotnet test siem/PtkSiem.slnx

      - name: Producer to SIEM conformance
        env:
          PTK_SIEM_CONFORMANCE_MODE: in-process
        run: >-
          dotnet test
          server/PtkMcpServer.Tests/SiemConformance/PtkMcpServer.SiemConformance.Tests.csproj
